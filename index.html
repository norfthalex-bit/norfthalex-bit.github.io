<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Portfolio</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0a0a0a; /* Deep dark base for particle contrast */
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* Canvas styling to sit behind the card */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* The Glass Container */
        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Contact Items */
        .contact-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: block;
        }

        .info-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .id-badge {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            font-family: monospace;
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <!-- Animated background canvas -->
    <canvas id="particle-canvas"></canvas>

    <main class="glass-card">
        <h1>Your Name</h1>
        <p class="subtitle">Digital Identity</p>

        <div class="contact-section">
            <a href="https://www.roblox.com/users/YOUR_ID_HERE/profile" target="_blank" class="info-box">
                <span class="label">Roblox</span>
                <span class="value">@Username</span>
                <span class="id-badge">ID: 123456789</span>
            </a>

            <div class="info-box">
                <span class="label">Discord</span>
                <span class="value">username_here</span>
                <span class="id-badge">ID: 987654321012345678</span>
            </div>

            <a href="mailto:your@email.com" class="info-box">
                <span class="label">Email</span>
                <span class="value">your@email.com</span>
            </a>
        </div>

        <footer>
            &copy; 2026 • Professional Portfolio
        </footer>
    </main>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;

                // Simple Repel effect
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    if (mouse.x > this.x && this.x > 0) this.x -= 1;
                    if (mouse.x < this.x && this.x < canvas.width) this.x += 1;
                    if (mouse.y > this.y && this.y > 0) this.y -= 1;
                    if (mouse.y < this.y && this.y < canvas.height) this.y += 1;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            let quantity = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < quantity; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - dist/150})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
