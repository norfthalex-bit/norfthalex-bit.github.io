<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Portfolio</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Modern deep gradient background */
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            color: #ffffff;
            overflow: hidden;
        }

        /* The Glass Container */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Contact Items */
        .contact-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: block;
        }

        .info-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        .label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .id-badge {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
        }

        footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            opacity: 0.4;
        }

        /* Animated background blob for extra flare */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-50%, -50%); }
            to { transform: translate(50%, 50%); }
        }
    </style>
</head>
<body>
    <div class="blob"></div>

    <main class="glass-card">
        <h1>Your Name</h1>
        <p class="subtitle">Digital Identity</p>

        <div class="contact-section">
            <a href="https://www.roblox.com/users/YOUR_ID_HERE/profile" target="_blank" class="info-box">
                <span class="label">Roblox</span>
                <span class="value">@Username</span>
                <span class="id-badge">ID: 123456789</span>
            </a>

            <div class="info-box">
                <span class="label">Discord</span>
                <span class="value">username_here</span>
                <span class="id-badge">ID: 987654321012345678</span>
            </div>

            <a href="mailto:your@email.com" class="info-box">
                <span class="label">Email</span>
                <span class="value">your@email.com</span>
            </a>
        </div>

        <footer>
            &copy; 2026 • Professional Portfolio
        </footer>
    </main>
</body>
</html>
