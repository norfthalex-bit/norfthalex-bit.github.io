<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Portfolio</title>
    <style>
        :root {
            /* Dark Theme Palette */
            --bg-color: #050505;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff; /* Clean white accent */
            --sub-text: #888888;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        /* Animated background canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* The Glass Container */
        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1.5px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--sub-text);
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* Contact Items */
        .contact-section {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 1.2rem;
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: white;
            display: block;
        }

        .info-box:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--sub-text);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .id-badge {
            font-size: 0.75rem;
            color: var(--sub-text);
            margin-top: 6px;
            display: block;
            font-family: 'JetBrains Mono', monospace;
            opacity: 0.6;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: var(--sub-text);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- Constellation Particles -->
    <canvas id="particle-canvas"></canvas>

    <main class="glass-card">
        <h1>Your Name</h1>
        <p class="subtitle">Digital Identity</p>

        <div class="contact-section">
            <a href="https://www.roblox.com/users/YOUR_ID_HERE/profile" target="_blank" class="info-box">
                <span class="label">Roblox</span>
                <span class="value">@Username</span>
                <span class="id-badge">UID: 123456789</span>
            </a>

            <div class="info-box">
                <span class="label">Discord</span>
                <span class="value">username_here</span>
                <span class="id-badge">ID: 987654321012345678</span>
            </div>

            <a href="mailto:your@email.com" class="info-box">
                <span class="label">Mail Protocol</span>
                <span class="value">your@email.com</span>
            </a>
        </div>

        <footer>
            &copy; 2026 • SYSTEM TERMINAL
        </footer>
    </main>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.speedY = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            let quantity = (canvas.width * canvas.height) / 10000;
            for (let i = 0; i < quantity; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.15 * (1 - dist/150)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
